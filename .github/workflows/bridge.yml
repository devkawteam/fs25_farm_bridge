name: FS25 Farm Bridge

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync_server_1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Server 1 sync
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: PYTHONPATH=src python -m fs25_farm_bridge --server 1

  sync_server_2:
    runs-on: ubuntu-latest
    needs: sync_server_1
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Server 2 sync
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: PYTHONPATH=src python -m fs25_farm_bridge --server 2
