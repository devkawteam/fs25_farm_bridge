name: FS25 Farm Bridge

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Farm Bridge
        env:
          BASE44_API_URL: ${{ secrets.BASE44_API_URL }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          GPORTAL_FTP_HOST: ${{ secrets.GPORTAL_FTP_HOST }}
          GPORTAL_FTP_PORT: ${{ secrets.GPORTAL_FTP_PORT }}
          GPORTAL_FTP_USER: ${{ secrets.GPORTAL_FTP_USER }}
          GPORTAL_FTP_PASS: ${{ secrets.GPORTAL_FTP_PASS }}
        run: PYTHONPATH=src python -m fs25_farm_bridge
